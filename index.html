<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>Pool Log</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F4F1EA; --surface: #FBFAF5; --border: #E2DDD0;
    --teal: #1B5E6B; --teal-light: #DCEEF0;
    --text: #2E2B24; --muted: #8A8275; --label: #5C574D;
    --good-bg: #EBF5EF; --good-border: #9FCDB0; --good-text: #266040;
    --warn-bg: #FBF1E0; --warn-border: #E8C290; --warn-text: #8C5010;
    --urgent-bg: #FBE9E7; --urgent-border: #E8A99E; --urgent-text: #852E22;
    --info-bg: #EAF1FB; --info-border: #A9C5E8; --info-text: #264E7C;
    --action-bg: #F3EEF8; --action-border: #C9B8E0; --action-text: #5A3E84;
    --dot-ok: #7FB894; --dot-ok-b: #5F9D78;
    --dot-low: #E8B95C; --dot-low-b: #D4A33E;
    --dot-out: #D9776A; --dot-out-b: #C25E50;
  }
  body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; padding-bottom: 40px; }

  /* HEADER */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 16px 12px; }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .logo { width: 40px; height: 40px; border-radius: 10px; background: var(--teal); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  h1 { font-size: 20px; font-weight: 700; color: var(--teal); font-family: Georgia, serif; letter-spacing: -0.3px; }
  .subtitle { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .last-reading { font-size: 12px; color: var(--muted); display: flex; justify-content: space-between; }
  .last-reading strong { font-weight: 600; }

  /* CONTEXT STRIP */
  .context-strip { background: var(--surface); border-bottom: 1px solid var(--border); padding: 9px 12px; display: flex; flex-wrap: wrap; gap: 5px; }
  .ctx-btn { padding: 6px 11px; border-radius: 999px; border: 1.5px solid var(--border); background: transparent; color: var(--label); font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .ctx-btn.active { background: var(--teal); border-color: var(--teal); color: #fff; }

  /* WEATHER */
  #weather-bar { margin: 12px 12px 0; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); padding: 10px 14px; font-size: 13px; color: var(--label); display: none; }
  #weather-bar.visible { display: block; }
  .weather-inner { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  .weather-val { font-weight: 700; }
  #weather-alerts { margin-top: 8px; }
  .weather-alert { font-size: 13px; line-height: 1.4; padding: 8px 10px; border-radius: 8px; margin-bottom: 6px; border: 1px solid; }

  /* TABS */
  nav { display: flex; gap: 3px; padding: 10px 12px 0; }
  .tab-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 3px; padding: 7px 2px; border-radius: 10px; border: 1px solid transparent; background: transparent; color: var(--muted); font-size: 11px; font-weight: 600; cursor: pointer; }
  .tab-btn.active { background: var(--surface); color: var(--teal); border-color: var(--border); }
  .tab-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

  /* MAIN */
  main { padding: 12px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
  .card-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
  .section-label { font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 8px; }
  .ctx-card { border-radius: 12px; padding: 12px 14px; border: 1px solid; font-size: 13.5px; line-height: 1.5; margin-bottom: 12px; }

  /* FORM */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; font-weight: 600; color: var(--label); }
  .field-range { font-weight: 400; color: #A8A095; font-size: 11px; }
  input[type=number], input[type=text], input[type=date], textarea, select {
    border: 1.5px solid var(--border); border-radius: 9px; padding: 10px 12px;
    font-size: 15px; background: #fff; color: var(--text); outline: none; font-family: inherit; width: 100%;
  }
  textarea { min-height: 58px; resize: vertical; }
  input.good { border-color: var(--good-border); background: var(--good-bg); }
  input.warn { border-color: var(--warn-border); background: var(--warn-bg); }
  input.urgent { border-color: var(--urgent-border); background: var(--urgent-bg); }
  .save-btn { margin-top: 14px; width: 100%; background: var(--teal); color: #fff; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .save-btn:active { opacity: 0.85; }
  .sec-btn { margin-top: 8px; width: 100%; background: transparent; color: var(--teal); border: 1.5px solid var(--teal); border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .saved-flash { text-align: center; color: var(--good-text); font-weight: 600; font-size: 13px; margin-top: 8px; height: 18px; }

  /* RECS */
  .rec-card { border: 1px solid; border-radius: 12px; padding: 12px 14px; font-size: 13.5px; line-height: 1.45; margin-bottom: 8px; }

  /* COACH CARD */
  .coach-card { border-radius: 14px; padding: 16px 18px; margin-top: 14px; background: var(--teal); color: #fff; position: relative; }
  .coach-label { font-size: 10.5px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.65; margin-bottom: 8px; }
  .coach-text { font-size: 14.5px; line-height: 1.65; }
  .coach-refresh { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.15); border: none; border-radius: 8px; color: #fff; padding: 5px 9px; font-size: 12px; font-weight: 700; cursor: pointer; }
  .coach-refresh:active { background: rgba(255,255,255,0.25); }
  .coach-updating { opacity: 0.6; font-size: 11px; margin-top: 6px; }
  .coach-spinner-inline { display: inline-block; width: 10px; height: 10px; border: 1.5px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 4px; vertical-align: middle; }
  .coach-loading-empty { display: flex; align-items: center; gap: 10px; padding: 16px; color: var(--muted); font-size: 13px; margin-top: 12px; }
  .coach-spinner { width: 18px; height: 18px; border: 2.5px solid var(--border); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* LOAD LAST READINGS */
  .load-last-btn { width: 100%; margin-bottom: 12px; background: transparent; color: var(--label); border: 1.5px solid var(--border); border-radius: 10px; padding: 9px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .load-last-btn:active { background: var(--border); }

  /* HISTORY */
  .history-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
  .history-card.action-entry { border-color: var(--action-border); background: var(--action-bg); }
  .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .history-time { font-size: 12px; font-weight: 700; color: var(--label); }
  .history-type { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 5px; }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip { border: 1px solid; border-radius: 999px; padding: 3px 9px; font-size: 11.5px; font-weight: 600; }
  .chip.good { background: var(--good-bg); border-color: var(--good-border); color: var(--good-text); }
  .chip.warn { background: var(--warn-bg); border-color: var(--warn-border); color: var(--warn-text); }
  .chip.urgent { background: var(--urgent-bg); border-color: var(--urgent-border); color: var(--urgent-text); }
  .chip.neutral { background: #F4F1EA; border-color: #D9D2C4; color: #6B6358; }
  .chip.action { background: var(--action-bg); border-color: var(--action-border); color: var(--action-text); }
  .history-notes { font-size: 13px; color: var(--label); line-height: 1.4; margin-top: 6px; }
  .muted { color: var(--muted); font-size: 13.5px; line-height: 1.5; }

  /* ACTION TYPE PICKER */
  .action-type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 4px; }
  .atype-btn { padding: 10px 8px; border-radius: 10px; border: 1.5px solid var(--border); background: #fff; color: var(--label); font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; }
  .atype-btn.selected { border-color: var(--teal); background: var(--teal-light); color: var(--teal); }

  /* NEXT UP */
  .task-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
  .task-card.urgent-card { border-color: var(--urgent-border); background: var(--urgent-bg); }
  .task-card.warn-card { border-color: var(--warn-border); background: var(--warn-bg); }
  .task-row { display: flex; align-items: flex-start; gap: 12px; }
  .task-icon { font-size: 22px; flex-shrink: 0; line-height: 1; margin-top: 1px; }
  .task-body { flex: 1; min-width: 0; }
  .task-label { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
  .task-due { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .task-due.overdue { color: var(--urgent-text); }
  .task-due.soon { color: var(--warn-text); }
  .task-due.ok { color: var(--teal); }
  .task-due.unknown { color: var(--muted); font-style: italic; }
  .task-last { font-size: 11.5px; color: var(--muted); }
  .task-weather { font-size: 12.5px; color: var(--urgent-text); font-weight: 700; margin-top: 4px; }
  .task-note { font-size: 12px; color: var(--muted); margin-top: 3px; font-style: italic; }
  .btn-setdate { border: none; background: transparent; color: var(--muted); font-size: 11.5px; font-weight: 600; cursor: pointer; padding: 2px; }

  /* INVENTORY */
  .inv-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .status-dot { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid; cursor: pointer; flex-shrink: 0; }
  .inv-name { flex: 1; font-size: 13.5px; }
  .inv-amount { width: 90px; border: 1.5px solid var(--border); border-radius: 8px; padding: 6px 8px; font-size: 13px; background: #fff; font-family: inherit; }
  .icon-btn { border: none; background: transparent; color: var(--muted); cursor: pointer; padding: 4px; display: flex; align-items: center; }
  .add-row { display: flex; gap: 6px; margin-top: 12px; }
  .add-btn { border: none; border-radius: 8px; background: var(--teal); color: #fff; width: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; flex-shrink: 0; }

  /* MODAL */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; display: flex; align-items: flex-end; }
  .modal { background: var(--surface); border-radius: 18px 18px 0 0; padding: 20px; width: 100%; max-height: 88vh; overflow-y: auto; }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
  .modal label { font-size: 12.5px; font-weight: 600; color: var(--label); display: block; margin-bottom: 4px; margin-top: 12px; }
  .modal-btns { display: flex; gap: 8px; margin-top: 16px; }
  .modal-btns button { flex: 1; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; }
  .btn-cancel { background: var(--border); color: var(--text); }
  .btn-save { background: var(--teal); color: #fff; }
  select { appearance: none; }
  .inv-deduct-note { font-size: 12px; color: var(--good-text); margin-top: 4px; font-weight: 600; min-height: 16px; }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #131210; --surface: #1D1B17; --border: #302C26;
      --text: #F2EFE8; --muted: #9C9488; --label: #CCC4B4;
      --good-bg: #0D1F13; --good-border: #1F4828; --good-text: #6EC48A;
      --warn-bg: #201408; --warn-border: #442E10; --warn-text: #D4A450;
      --urgent-bg: #1E0F0B; --urgent-border: #421E16; --urgent-text: #D46E5E;
      --info-bg: #091522; --info-border: #183050; --info-text: #5E8ED0;
      --action-bg: #12092A; --action-border: #2C1A50; --action-text: #8C70C0;
      --teal-light: #0D2E34;
    }
    input[type=number], input[type=text], input[type=date], textarea, select, .inv-amount, .atype-btn { background: #242018; color: var(--text); border-color: var(--border); }
    .modal { background: #1D1B17; }
    .chip.neutral { background: #242018; border-color: var(--border); color: var(--muted); }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" width="24" height="24">
        <path d="M3 22 Q8 15 14 22 Q20 29 25 22" stroke="white" stroke-width="2.8" stroke-linecap="round" fill="none"/>
        <path d="M3 15 Q8 8 14 15 Q20 22 25 15" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.7"/>
        <path d="M6 9 Q10 5 14 9 Q18 13 22 9" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.4"/>
      </svg>
    </div>
    <div>
      <h1>Pool Log</h1>
      <p class="subtitle">30′ round · vinyl liner · 25,000 gal · Mineral Frog</p>
    </div>
  </div>
  <div class="last-reading" id="last-reading-row" style="display:none">
    <strong>Last reading</strong>
    <span id="last-reading-time"></span>
  </div>
</header>

<div class="context-strip">
  <button class="ctx-btn active" data-ctx="maintenance">Maintenance</button>
  <button class="ctx-btn" data-ctx="problem">Problem</button>
  <button class="ctx-btn" data-ctx="event">Event</button>
  <button class="ctx-btn" data-ctx="opening">Opening</button>
  <button class="ctx-btn" data-ctx="closing">Closing</button>
</div>

<div id="weather-bar">
  <div class="weather-inner" id="weather-inner">
    <span style="color:var(--muted);font-size:13px">Fetching weather…</span>
  </div>
  <div id="weather-alerts"></div>
</div>

<nav>
  <button class="tab-btn active" data-tab="log">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    Test
  </button>
  <button class="tab-btn" data-tab="addaction">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
    Add
  </button>
  <button class="tab-btn" data-tab="nextup">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    Next Up
  </button>
  <button class="tab-btn" data-tab="history">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    History
  </button>
  <button class="tab-btn" data-tab="inventory">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
    Supplies
  </button>
</nav>

<main id="main"></main>

<!-- SET DATE MODAL -->
<div id="setdate-modal" class="modal-backdrop" style="display:none">
  <div class="modal">
    <h3 id="setdate-modal-title">Set last done date</h3>
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px">Seeds the schedule from your history. Updates automatically from new logged actions.</p>
    <label>Date last completed</label>
    <input type="date" id="setdate-modal-input" />
    <div class="modal-btns">
      <button class="btn-cancel" id="setdate-cancel">Cancel</button>
      <button class="btn-save" id="setdate-save">Save</button>
    </div>
  </div>
</div>

<script>
// ── SCHEDULED TASKS ──────────────────────────────────────────────────────────
const TASKS = [
  {
    id: 'shock', label: 'Shock the pool', icon: '⚡', freq: 11,
    match: e => e.type === 'action' && (e.actionType === 'Shocked' || e.actionType === 'Shock'),
    weatherAlert: w => w && (w.rain24h >= 1 || w.hotRun >= 3),
    weatherMsg: w => w && w.rain24h >= 1
      ? `${w.rain24h}" rain today — shock tonight regardless of schedule`
      : `${w.hotRun} consecutive 90°F+ days — shock before heatwave hits`,
    note: 'Shock at sunset. ~2 lbs for 25k gal.',
  },
  { id: 'filter',     label: 'Clean filter',         icon: '🔧', freq: 14, match: e => e.type === 'action' && e.actionType === 'Filter cleaned',       note: null },
  { id: 'pumpfilter', label: 'Clean pump filter',    icon: '💧', freq: 14, match: e => e.type === 'action' && e.actionType === 'Pump filter cleaned',  note: null },
  { id: 'frog',       label: 'Replace Frog chlorine',icon: '🐸', freq: 30, match: e => e.type === 'action' && e.actionType === 'Frog chlorine',         note: 'Check mineral level indicator.' },
  { id: 'vacuum',     label: 'Vacuum pool',           icon: '🌀', freq: 7,  match: e => e.type === 'action' && e.actionType === 'Vacuumed',              note: null },
];

// ── CONSTANTS ────────────────────────────────────────────────────────────────
const TARGETS = {
  totalChlor:  { min: 0.5, max: 1.5, label: 'Total Chlorine',  unit: 'ppm' },
  freeChlor:   { min: 0.5, max: 1.5, label: 'Free Chlorine',   unit: 'ppm' },
  bromine:     { min: 0,   max: 1,   label: 'Bromine',         unit: 'ppm' },
  alkalinity:  { min: 80,  max: 120, label: 'Alkalinity',      unit: 'ppm' },
  cya:         { min: 30,  max: 50,  label: 'CYA',             unit: 'ppm' },
  hardness:    { min: 200, max: 400, label: 'Hardness',        unit: 'ppm' },
  ph:          { min: 7.4, max: 7.6, label: 'pH',              unit: '' },
  chlorine:    { min: 0.5, max: 1.5, label: 'Chlorine',        unit: 'ppm' }, // legacy key
};
const FIELDS = ['totalChlor', 'freeChlor', 'bromine', 'alkalinity', 'cya', 'hardness', 'ph'];

const CTX_INFO = {
  maintenance: { bg:'var(--info-bg)',   border:'var(--info-border)',   text:'var(--info-text)',   msg:'Regular maintenance. Mineral Frog target: chlorine 0.5–1.5 ppm. Log your test, check next actions, top up as needed.' },
  opening:     { bg:'var(--good-bg)',   border:'var(--good-border)',   text:'var(--good-text)',   msg:'Pool opening. Sequence: alkalinity first → pH → CYA stabilizer (in a sock near return jet) → shock last at sunset. Install fresh Mineral Frog cartridge before opening.' },
  closing:     { bg:'var(--info-bg)',   border:'var(--info-border)',   text:'var(--info-text)',   msg:'Closing. Target: chlorine 1–2 ppm, pH 7.2–7.6. Add winter algaecide and close with a final shock. Lower water below skimmer. Remove Mineral Frog cartridge for winter.' },
  problem:     { bg:'var(--urgent-bg)', border:'var(--urgent-border)', text:'var(--urgent-text)', msg:'Problem mode. Log current readings. Green water: check chlorine + CYA first. Cloudy: check pH + alkalinity. Also check if Mineral Frog cartridge needs replacing.' },
  event:       { bg:'var(--warn-bg)',   border:'var(--warn-border)',   text:'var(--warn-text)',   msg:'Event prep. Aim for chlorine 1–1.5 ppm 24h before. Shock 2 nights before if needed. Chlorine should be ≤1.5 ppm before swimming. Retest after heavy swimmer load.' },
};

const DEFAULT_INVENTORY = [
  { name:'In The Swim Shock 24',      amount:'4',   unit:'lbs', status:'low' },
  { name:'Soda Ash',                  amount:'4',   unit:'lbs', status:'ok' },
  { name:'CYA / Stabilizer',          amount:'0',   unit:'lbs', status:'out' },
  { name:"Leslie's Alkalinity Up",    amount:'5',   unit:'lbs', status:'ok' },
  { name:'Baking Soda',               amount:'5.4', unit:'lbs', status:'ok' },
  { name:'HTH pH Down',               amount:'5',   unit:'lbs', status:'ok' },
  { name:'HTH Clarifier',             amount:'',    unit:'partial', status:'ok' },
  { name:'Malibu Water Perfect',      amount:'1',   unit:'qt',  status:'ok' },
  { name:'In The Swim Algaecide',     amount:'2',   unit:'qt',  status:'ok' },
  { name:'In The Swim Algaecide 60+', amount:'1',   unit:'qt',  status:'ok' },
  { name:'In The Swim Di-Zap',        amount:'8',   unit:'lbs', status:'ok' },
  { name:'Spring Stain Away',         amount:'2',   unit:'qt',  status:'ok' },
  { name:'Leap Pool Wake Up',         amount:'1',   unit:'x',   status:'ok' },
  { name:'Leap Pool Torpedo',         amount:'2',   unit:'x',   status:'ok' },
  { name:'Filter Cleaner',            amount:'1',   unit:'container', status:'ok' },
];

const API = '/api/log';
const COACH_API = '/api/coach';

// ── STATE ────────────────────────────────────────────────────────────────────
let state = {
  ctx: 'maintenance', tab: 'log',
  reading: { totalChlor:'', freeChlor:'', bromine:'', alkalinity:'', cya:'', hardness:'', ph:'', visibility:'', notes:'' },
  log: [], inventory: [], rules: [], weather: null,
  actionType: 'Added chemical',
  setdateTaskId: null,
  coachNarrative: null,   // persists until a new one arrives
  coachLoading: false,
};

async function load() {
  try { state.inventory = JSON.parse(localStorage.getItem('pool:inventory')) || DEFAULT_INVENTORY.map(x=>({...x})); } catch(e) { state.inventory = DEFAULT_INVENTORY.map(x=>({...x})); }
  try { state.rules     = JSON.parse(localStorage.getItem('pool:rules'))     || []; } catch(e) { state.rules = []; }
  if (!state.inventory.length) state.inventory = DEFAULT_INVENTORY.map(x=>({...x}));

  // Restore coach narrative from localStorage (valid for 48 hours)
  try {
    const saved = JSON.parse(localStorage.getItem('pool:coach') || 'null');
    if (saved && saved.narrative && Date.now() - saved.ts < 48 * 3600000) {
      state.coachNarrative = saved.narrative;
    }
  } catch(e) {}

  try {
    const cached = JSON.parse(localStorage.getItem('pool:log:cache') || '[]');
    if (cached.length) { state.log = cached; render(); }
  } catch(e) {}

  try {
    const data = await fetch(API).then(r => r.json());
    if (Array.isArray(data)) {
      state.log = data;
      localStorage.setItem('pool:log:cache', JSON.stringify(data));
      render();
    }
  } catch(e) { console.warn('Notion API unavailable, using local cache'); }

  // Always show coach on load: fetch fresh if no cached narrative, or if
  // cached narrative is older than the most recent log entry
  const lastTest = state.log.find(e => e.type === 'test');
  if (lastTest) {
    try {
      const saved = JSON.parse(localStorage.getItem('pool:coach') || 'null');
      const coachTs = saved ? saved.ts : 0;
      const logTs = new Date(lastTest.timestamp).getTime();
      if (!state.coachNarrative || logTs > coachTs) fetchCoaching(lastTest);
    } catch(e) { fetchCoaching(lastTest); }
  }
}

function save(key, data) { try { localStorage.setItem('pool:'+key, JSON.stringify(data)); } catch(e){} }

async function saveLogEntry(entry) {
  state.log.unshift(entry);
  state.log = state.log.slice(0, 500);
  localStorage.setItem('pool:log:cache', JSON.stringify(state.log));
  render();
  try {
    const result = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(entry) }).then(r => r.json());
    if (result.notionId) { entry.notionId = result.notionId; localStorage.setItem('pool:log:cache', JSON.stringify(state.log)); }
  } catch(e) { console.warn('Failed to sync to Notion:', e); }
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function getStatus(key, value) {
  const v = parseFloat(value);
  if (isNaN(v) || value === '') return null;
  const t = TARGETS[key];
  if (v < t.min) return v < t.min * 0.5 ? 'urgent' : 'warn';
  if (v > t.max) return 'warn';
  return 'good';
}
function fmtDate(iso) { return new Date(iso).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' }); }
function fmtShort(iso) { return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric' }); }
function daysSince(iso) { return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000); }

function getRecs(r, weather) {
  const recs = [];
  // Support both old 'chlorine' key and new 'freeChlor' key
  const fc = parseFloat(r.freeChlor ?? r.chlorine);
  const tc = parseFloat(r.totalChlor);
  const ph = parseFloat(r.ph), alk = parseFloat(r.alkalinity), cya = parseFloat(r.cya);
  if (!isNaN(fc)) {
    if (fc <= 0)       recs.push({ level:'urgent', text:'No free chlorine detected — shock tonight at sunset (2 lbs for 25k gal). Never shock in the morning; sunlight destroys it before it works.' });
    else if (fc < 0.5) recs.push({ level:'urgent', text:`Free chlorine critically low (${fc} ppm) — shock tonight at sunset. Mineral Frog needs at least 0.5 ppm to work.` });
    else if (fc < 1.0) recs.push({ level:'warn',   text:`Free chlorine low (${fc} ppm) — consider shocking at sunset to bring back to 1–1.5 ppm.` });
    else if (fc > 1.5) recs.push({ level:'info',   text:`Free chlorine above target (${fc} ppm) — fine to swim. Skip shock, let it burn down.` });
  }
  if (!isNaN(fc) && !isNaN(tc)) {
    const combined = Math.round((tc - fc) * 10) / 10;
    if (combined > 0.5) recs.push({ level:'warn', text:`Combined chlorine high (${combined} ppm) — chloramines present. Shock tonight to break through.` });
  }
  if (!isNaN(ph)) {
    if (ph < 7.4)      recs.push({ level:'warn', text:`pH low (${ph}) — add soda ash to raise toward 7.4–7.6. Retest after 1 hour.` });
    else if (ph > 7.6) recs.push({ level:'warn', text:`pH high (${ph}) — add pH Down. Retest after 1 hour.` });
  }
  if (!isNaN(alk)) {
    if (alk < 80)      recs.push({ level:'info', text:'Alkalinity low — add baking soda or soda ash.' });
    else if (alk > 120)recs.push({ level:'info', text:'Alkalinity high — add pH Down slowly. Retest after 30 min.' });
  }
  if (!isNaN(cya)) {
    if (cya < 30)      recs.push({ level:'warn', text:`CYA low (${cya} ppm) — add stabilizer in a sock near the return jet. Target: 40 ppm.` });
    else if (cya > 50) recs.push({ level:'info', text:'CYA high — hold off adding stabilizer. Partial water swap at next top-off.' });
  }
  if (weather) {
    if (weather.rain24h >= 1)        recs.push({ level:'warn', text:`Heavy rain (${weather.rain24h}") — retest chlorine and likely shock tonight.` });
    else if (weather.rain24h >= 0.5) recs.push({ level:'info', text:`Rain today (${weather.rain24h}") — check chlorine.` });
    if (weather.tempF >= 90)         recs.push({ level:'info', text:`Hot day (${weather.tempF}°F) — heat burns chlorine faster. Check again tonight.` });
  }
  if (recs.length === 0 && Object.values(r).some(v => v !== ''))
    recs.push({ level:'good', text:'All readings in range — no action needed. Mineral Frog is doing its job.' });
  return recs;
}

const REC_STYLES = {
  urgent: 'background:var(--urgent-bg);border-color:var(--urgent-border);color:var(--urgent-text)',
  warn:   'background:var(--warn-bg);border-color:var(--warn-border);color:var(--warn-text)',
  info:   'background:var(--info-bg);border-color:var(--info-border);color:var(--info-text)',
  good:   'background:var(--good-bg);border-color:var(--good-border);color:var(--good-text)',
};

function invDisplayAmount(item) {
  if (!item.amount && !item.unit) return '—';
  if (item.unit === 'partial' || item.unit === 'container' || item.unit === 'x') return `${item.amount||''} ${item.unit}`.trim();
  return item.amount ? `${item.amount} ${item.unit}` : item.unit;
}

function deductInventory(idx, amountStr) {
  const item = state.inventory[idx];
  const used = parseFloat(amountStr), cur = parseFloat(item.amount);
  if (isNaN(used) || isNaN(cur)) return null;
  const remaining = Math.max(0, Math.round((cur - used) * 10) / 10);
  item.amount = String(remaining);
  if (remaining <= 0) item.status = 'out';
  else if (remaining <= cur * 0.25) item.status = 'low';
  return remaining;
}

// ── WEATHER ──────────────────────────────────────────────────────────────────
async function fetchWeather() {
  const bar = document.getElementById('weather-bar');
  bar.classList.add('visible');
  if (!navigator.geolocation) { bar.classList.remove('visible'); return; }
  navigator.geolocation.getCurrentPosition(async pos => {
    const { latitude: lat, longitude: lon } = pos.coords;
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,precipitation&daily=temperature_2m_max,precipitation_sum&temperature_unit=fahrenheit&precipitation_unit=inch&forecast_days=4&timezone=auto`;
      const data = await fetch(url).then(r => r.json());
      const tempF = Math.round(data.current.temperature_2m);
      const rain24h = Math.round((data.daily.precipitation_sum?.[0] || 0) * 10) / 10;
      const dailyTemps = data.daily.temperature_2m_max || [];
      let hotRun = 0;
      for (const t of dailyTemps) { if (t >= 90) hotRun++; else break; }
      state.weather = { tempF, rain24h, hotRun };
      document.getElementById('weather-inner').innerHTML = `
        <div style="display:flex;gap:5px;align-items:center"><span>🌡️</span><span class="weather-val">${tempF}°F</span></div>
        <div style="display:flex;gap:5px;align-items:center"><span>🌧️</span><span class="weather-val">${rain24h}" today</span></div>
        ${hotRun >= 2 ? `<div style="display:flex;gap:5px;align-items:center"><span>☀️</span><span style="font-size:12px;color:var(--warn-text);font-weight:600">${hotRun}d 90°F+</span></div>` : ''}
      `;
      const alerts = [];
      if (rain24h >= 1)        alerts.push({ level:'warn', text:`⚠️ ${rain24h}" rain today — retest chlorine and likely shock tonight.` });
      else if (rain24h >= 0.5) alerts.push({ level:'info', text:`🌧️ ${rain24h}" rain today — check chlorine.` });
      if (hotRun >= 3)         alerts.push({ level:'warn', text:`☀️ ${hotRun} consecutive 90°F+ days — shock now.` });
      else if (tempF >= 90)    alerts.push({ level:'info', text:`☀️ ${tempF}°F — heat burns chlorine faster. Check tonight.` });
      document.getElementById('weather-alerts').innerHTML = alerts.map(a => `<div class="weather-alert" style="${REC_STYLES[a.level]}">${a.text}</div>`).join('');
      render();
    } catch(e) {
      document.getElementById('weather-inner').innerHTML = '<span style="color:var(--muted);font-size:12px">Weather unavailable</span>';
    }
  }, () => {
    document.getElementById('weather-inner').innerHTML = '<span style="color:var(--muted);font-size:12px">Enable location for weather alerts</span>';
  });
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const main = document.getElementById('main');
  const tests = state.log.filter(e => e.type === 'test' || !e.type);
  if (tests.length) {
    document.getElementById('last-reading-row').style.display = 'flex';
    document.getElementById('last-reading-time').textContent = fmtDate(tests[0].timestamp);
  }
  if (state.tab === 'log')       main.innerHTML = renderLog();
  if (state.tab === 'addaction') main.innerHTML = renderAddAction();
  if (state.tab === 'nextup')    main.innerHTML = renderNextUp();
  if (state.tab === 'history')   main.innerHTML = renderHistory();
  if (state.tab === 'inventory') main.innerHTML = renderInventory();
  bindEvents();
}

// COACH CARD HELPER — always renders something when there's log data

  if (state.coachLoading && state.coachNarrative) {
    return `<div class="coach-card">

      <div class="coach-text">${state.coachNarrative}</div>

    </div>`;
  }
  if (state.coachLoading) {

// NEXT UP TAB
function renderNextUp() {
  const today = new Date(); today.setHours(0,0,0,0);
  const taskItems = TASKS.map(task => {
    const lastLogEntry = state.log.find(e => task.match(e));
    const manualDate   = localStorage.getItem(`pool:task:${task.id}:lastdone`);
    let lastDoneTs = lastLogEntry ? new Date(lastLogEntry.timestamp) : manualDate ? new Date(manualDate) : null;
    let nextDue = null, daysUntil = null;
    if (lastDoneTs) {
      const ld = new Date(lastDoneTs); ld.setHours(0,0,0,0);
      nextDue = new Date(ld.getTime() + task.freq * 86400000);
      daysUntil = Math.round((nextDue.getTime() - today.getTime()) / 86400000);
    }
    const weatherTrig = task.weatherAlert ? task.weatherAlert(state.weather) : false;
    const overdue = daysUntil !== null && daysUntil <= 0;
    const soonDue = daysUntil !== null && daysUntil > 0 && daysUntil <= 3;
    return { ...task, lastDoneTs, nextDue, daysUntil, overdue, soonDue, weatherTrig, seeded: !!manualDate && !lastLogEntry };
  });
  taskItems.sort((a, b) => {
    if (b.weatherTrig && !a.weatherTrig) return 1;
    if (a.weatherTrig && !b.weatherTrig) return -1;
    if (b.overdue && !a.overdue) return 1;
    if (a.overdue && !b.overdue) return -1;
    if (a.daysUntil === null && b.daysUntil !== null) return 1;
    if (b.daysUntil === null && a.daysUntil !== null) return -1;
    return (a.daysUntil ?? 0) - (b.daysUntil ?? 0);
  });
  const cardsHtml = taskItems.map(task => {
    const isUrgent = task.overdue || task.weatherTrig;
    const cardClass = isUrgent ? 'task-card urgent-card' : task.soonDue ? 'task-card warn-card' : 'task-card';
    let dueText = '', dueClass = 'ok';
    if (task.nextDue) {
      if (task.overdue) { dueText = `Overdue ${Math.abs(task.daysUntil) > 0 ? Math.abs(task.daysUntil)+'d' : '— due today'}`; dueClass = 'overdue'; }
      else if (task.daysUntil === 0) { dueText = 'Due today'; dueClass = 'soon'; }
      else { dueText = `Due ${fmtShort(task.nextDue.toISOString())} · ${task.daysUntil}d`; dueClass = task.soonDue ? 'soon' : 'ok'; }
    } else { dueText = "Never logged — tap 📅 to seed from history"; dueClass = 'unknown'; }
    const lastText = task.lastDoneTs ? `Last: ${fmtShort(task.lastDoneTs.toISOString())} · ${daysSince(task.lastDoneTs.toISOString())}d ago${task.seeded ? ' (manual)' : ''}` : '';
    const weatherLine = task.weatherTrig && task.weatherMsg ? `<div class="task-weather">⚡ ${task.weatherMsg(state.weather)}</div>` : '';
    const noteLine = task.note ? `<div class="task-note">${task.note}</div>` : '';
    return `<div class="${cardClass}">
      <div class="task-row">
        <div class="task-icon">${task.icon}</div>
        <div class="task-body">
          <div class="task-label">${task.label}</div>
          <div class="task-due ${dueClass}">${dueText}</div>
          ${lastText ? `<div class="task-last">${lastText}</div>` : ''}
          ${weatherLine}${noteLine}
        </div>
        <button class="btn-setdate" data-setdate="${task.id}" title="Set last done date">📅</button>
      </div>
    </div>`;
  }).join('');
  return `
    <p class="muted" style="margin-bottom:10px;font-size:12px">Tap 📅 to seed a task from your Notion history. Updates automatically as you log actions.</p>
    ${cardsHtml}
  `;
}

// HISTORY TAB
function renderHistory() {
  if (!state.log.length) return `<p class="muted">Nothing logged yet.</p>`;
  return state.log.map((entry, idx) => {
    if (entry.type === 'action') {
      return `<div class="history-card action-entry">
        <div class="history-header"><span class="history-time">${fmtDate(entry.timestamp)}</span><button class="icon-btn" data-delete="${idx}">✕</button></div>
        <div class="history-type" style="color:var(--action-text)">⚗️ Action · ${entry.ctx||''}</div>
        <div class="chips">
          <span class="chip action">${entry.actionType}</span>
          ${entry.chemical ? `<span class="chip neutral">${entry.chemical}</span>` : ''}
          ${entry.amountUsed ? `<span class="chip neutral">${entry.amountUsed}</span>` : ''}
        </div>
        ${entry.notes ? `<div class="history-notes">${entry.notes}</div>` : ''}
      </div>`;
    }
    // Support both old entries (chlorine key) and new (freeChlor/totalChlor)
    const allKeys = [...FIELDS, 'chlorine'];
    const chips = allKeys.filter(k => entry[k] !== '' && entry[k] != null && TARGETS[k]).map(k => {
      const s = getStatus(k, entry[k]);
      const t = TARGETS[k];
      return `<span class="chip ${s||'neutral'}">${t.label}: ${entry[k]}${t.unit ? ' '+t.unit : ''}</span>`;
    }).join('');
    return `<div class="history-card">
      <div class="history-header"><span class="history-time">${fmtDate(entry.timestamp)}</span><button class="icon-btn" data-delete="${idx}">✕</button></div>
      <div class="history-type" style="color:var(--muted)">🧪 Test · ${entry.context||entry.ctx||''}</div>
      <div class="chips">${chips}${entry.visibility ? `<span class="chip neutral">👁 ${entry.visibility}</span>` : ''}</div>
      ${entry.notes ? `<div class="history-notes">${entry.notes}</div>` : ''}
    </div>`;
  }).join('');
}

        <button class="add-btn" id="add-inv-btn">＋</button>
      </div>
    </div>`;
}

// ── EVENTS ───────────────────────────────────────────────────────────────────
function bindEvents() {
  document.querySelectorAll('[data-field]').forEach(el => {
    el.addEventListener('input', e => {
      state.reading[e.target.dataset.field] = e.target.value;
      if (FIELDS.includes(e.target.dataset.field)) e.target.className = getStatus(e.target.dataset.field, e.target.value) || '';
      if (state.tab === 'log') updateRecs();
    });
  });

  const loadLastBtn = document.getElementById('load-last-btn');
  if (loadLastBtn) loadLastBtn.addEventListener('click', () => {
    const lastTest = state.log.find(e => e.type === 'test');
    if (!lastTest) return;
    FIELDS.forEach(k => { state.reading[k] = lastTest[k] != null ? String(lastTest[k]) : ''; });
    state.reading.visibility = lastTest.visibility || '';
    render();
  });

  const saveBtn = document.getElementById('save-btn');
  if (saveBtn) saveBtn.addEventListener('click', async () => {
    const hasData = FIELDS.some(k => state.reading[k] !== '') || state.reading.visibility || state.reading.notes;
    if (!hasData) return;
    const entry = { ...state.reading, type:'test', ctx: state.ctx, timestamp: new Date().toISOString() };
    const savedReading = { ...state.reading };
    state.reading = { totalChlor:'', freeChlor:'', bromine:'', alkalinity:'', cya:'', hardness:'', ph:'', visibility:'', notes:'' };
    await saveLogEntry(entry);
    const flash = document.getElementById('saved-flash');
    if (flash) { flash.textContent = 'Saved ✓'; setTimeout(() => { if (flash) flash.textContent = ''; }, 1800); }
    fetchCoaching(savedReading);
  });

  bindCoachRefresh();

  document.querySelectorAll('#atype-grid .atype-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.actionType = btn.dataset.atype;
      document.querySelectorAll('#atype-grid .atype-btn').forEach(b => b.classList.toggle('selected', b === btn));
      const show = state.actionType === 'Added chemical' || state.actionType === 'Shocked';
      const cf = document.getElementById('chemical-fields');
      if (cf) cf.style.display = show ? '' : 'none';
      // Auto-select shock chemical when Shocked is picked (inventory bug fix)
      if (state.actionType === 'Shocked') {
        const sel = document.getElementById('action-chemical');
        if (sel) {
          const idx = state.inventory.findIndex(item => item.name.toLowerCase().includes('shock') || item.name.toLowerCase().includes('di-zap'));
          if (idx >= 0) { sel.value = String(idx); updateDeductNote(); }
        }
      }
    });
  });

  const actionChemSel = document.getElementById('action-chemical');
  const actionAmtInput = document.getElementById('action-amount');
  if (actionChemSel) actionChemSel.addEventListener('change', updateDeductNote);
  if (actionAmtInput) actionAmtInput.addEventListener('input', updateDeductNote);

  const saveActionBtn = document.getElementById('save-action-btn');
  if (saveActionBtn) saveActionBtn.addEventListener('click', async () => {
    const sel = document.getElementById('action-chemical');
    const amountUsed = (document.getElementById('action-amount')||{}).value?.trim() || '';
    const notes = document.getElementById('action-notes').value.trim();
    const invIdx = sel && sel.value !== '' ? parseInt(sel.value) : null;
    const chemical = invIdx !== null ? state.inventory[invIdx].name : '';
    if (invIdx !== null && amountUsed) deductInventory(invIdx, amountUsed);
    save('inventory', state.inventory);
    const entry = { type:'action', actionType: state.actionType, chemical, amountUsed, notes, ctx: state.ctx, timestamp: new Date().toISOString() };
    if (document.getElementById('action-notes')) document.getElementById('action-notes').value = '';
    if (document.getElementById('action-amount')) document.getElementById('action-amount').value = '';
    if (sel) sel.value = '';
    if (document.getElementById('deduct-note')) document.getElementById('deduct-note').textContent = '';
    await saveLogEntry(entry);
    const flash = document.getElementById('action-flash');
    if (flash) { flash.textContent = 'Saved ✓'; setTimeout(() => { if (flash) flash.textContent = ''; }, 1800); }
  });

  document.querySelectorAll('[data-setdate]').forEach(btn => {
    btn.addEventListener('click', () => {
      const taskId = btn.dataset.setdate;
      const task = TASKS.find(t => t.id === taskId);
      if (!task) return;
      state.setdateTaskId = taskId;
      document.getElementById('setdate-modal-title').textContent = `Last done: ${task.label}`;
      const existing = localStorage.getItem(`pool:task:${taskId}:lastdone`);
      document.getElementById('setdate-modal-input').value = existing ? new Date(existing).toISOString().split('T')[0] : new Date().toISOString().split('T')[0];
      document.getElementById('setdate-modal').style.display = 'flex';
    });
  });

  document.querySelectorAll('[data-delete]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.log.splice(parseInt(btn.dataset.delete), 1);
      localStorage.setItem('pool:log:cache', JSON.stringify(state.log));
      render();
    });
  });

  document.querySelectorAll('[data-cycle]').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.cycle);
      const order = ['ok','low','out'];
      state.inventory[i].status = order[(order.indexOf(state.inventory[i].status)+1) % order.length];
      save('inventory', state.inventory);
      render();
    });
  });

  document.querySelectorAll('[data-inv-amount]').forEach(el => {
    el.addEventListener('change', e => {
      const i = parseInt(e.target.dataset.invAmount);
      const raw = e.target.value.trim(), num = parseFloat(raw);
      state.inventory[i].amount = isNaN(num) ? '' : String(num);
      state.inventory[i].unit   = raw.replace(/[\d.\s]/g, '').trim() || state.inventory[i].unit;
      save('inventory', state.inventory);
    });
  });

  document.querySelectorAll('[data-remove-inv]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.inventory.splice(parseInt(btn.dataset.removeInv), 1);
      save('inventory', state.inventory);
      render();
    });
  });

  const addInvBtn = document.getElementById('add-inv-btn');
  if (addInvBtn) addInvBtn.addEventListener('click', () => {
    const name = document.getElementById('new-item-name').value.trim();
    if (!name) return;
    const raw = document.getElementById('new-item-amt').value.trim() || '';
    const num = parseFloat(raw);
    state.inventory.push({ name, amount: isNaN(num) ? '' : String(num), unit: raw.replace(/[\d.\s]/g,'').trim() || raw, status:'ok' });
    save('inventory', state.inventory);
    render();
  });
}

function updateDeductNote() {
  const sel = document.getElementById('action-chemical');
  const amtEl = document.getElementById('action-amount');
  const note = document.getElementById('deduct-note');
  if (!sel || !amtEl || !note) return;
  const amt = amtEl.value.trim();
  if (!sel.value || !amt) { note.textContent = ''; return; }
  const item = state.inventory[parseInt(sel.value)];
  const used = parseFloat(amt), cur = parseFloat(item.amount);
  if (!isNaN(used) && !isNaN(cur)) {
    const remaining = Math.max(0, Math.round((cur - used) * 10) / 10);
    note.textContent = `Will deduct: ${cur} → ${remaining} ${item.unit}`;
  } else {
    note.textContent = "Non-numeric amount — inventory won't auto-deduct.";
  }
}

function updateRecs() {
  const recs = getRecs(state.reading, state.weather);
  document.querySelectorAll('.rec-card, .section-label').forEach(el => el.remove());
  if (recs.length) {
    const div = document.createElement('div');
    div.style.marginTop = '14px';
    div.innerHTML = `<div class="section-label">What to do</div>${recs.map(r=>`<div class="rec-card" style="${REC_STYLES[r.level]}">${r.text}</div>`).join('')}`;
    document.getElementById('main').appendChild(div);
  }
}

// ── COACHING ──────────────────────────────────────────────────────────────────
function updateCoachSection() {
  // Update the coach card in-place without re-rendering the whole page
  const section = document.getElementById('coach-section');
  if (section) {
    section.innerHTML = buildCoachHtml();
    bindCoachRefresh();
  }
}

async function fetchCoaching(reading) {
  state.coachLoading = true;
  updateCoachSection(); // show spinner / "Updating…" in-place, no full render
  try {
    const result = await fetch(COACH_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ reading, history: state.log.slice(0, 10), weather: state.weather, ctx: state.ctx }),
    }).then(r => r.json());
    if (result.narrative) {
      state.coachNarrative = result.narrative;
      localStorage.setItem('pool:coach', JSON.stringify({ narrative: result.narrative, ts: Date.now() }));
    }
  } catch(e) {
    console.warn('Coach unavailable:', e);
  }
  state.coachLoading = false;
  updateCoachSection(); // show final narrative in-place
}

// ── TABS & CONTEXT ────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.tab = btn.dataset.tab;
    render();
  });
});

document.querySelectorAll('.ctx-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ctx-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.ctx = btn.dataset.ctx;
    render();
  });
});

// ── SET DATE MODAL ────────────────────────────────────────────────────────────
document.getElementById('setdate-cancel').addEventListener('click', () => { document.getElementById('setdate-modal').style.display = 'none'; state.setdateTaskId = null; });
document.getElementById('setdate-save').addEventListener('click', () => {
  const dateVal = document.getElementById('setdate-modal-input').value;
  if (!dateVal || !state.setdateTaskId) return;
  localStorage.setItem(`pool:task:${state.setdateTaskId}:lastdone`, new Date(dateVal).toISOString());
  document.getElementById('setdate-modal').style.display = 'none';
  state.setdateTaskId = null;
  render();
});

// ── INIT ──────────────────────────────────────────────────────────────────────
load().then(() => render());
fetchWeather();
</script>
</body>
</html>
